# mini-swe-agent model-override layer for on-policy Qwen3-8B.
#
# This file is NOT a full config. scripts/run_mini_swe_batch.sh deep-merges it
# onto the mini-swe-agent installed base config
# (src/minisweagent/config/benchmarks/swebench.yaml), so the task prompts, step
# limit, and Docker environment come from the installed mini version and only
# the model wiring below is ours. That keeps the prompts reproducible against a
# pinned mini-swe-agent version instead of a stale hand-copied template.
#
# Topology (unchanged from the SWE-agent setup):
#   - mini-swe-agent + Docker run LOCALLY (WSL2); only Docker/test execution is local.
#   - Qwen3-8B inference runs on a REMOTE GPU (Colab A100) behind a public tunnel.
# The runner rewrites api_base / api_key / model_name from MODEL_API_BASE /
# MODEL_API_KEY / MODEL_NAME at run time, so you normally set those env vars and
# do not edit this file.

model:
  model_name: hosted_vllm/Qwen3-8B
  model_kwargs:
    api_base: http://localhost:8000/v1   # placeholder; set MODEL_API_BASE
    api_key: EMPTY                        # placeholder; set MODEL_API_KEY
    temperature: 0.0
    # THINKING OFF — locked project decision. Qwen3 must not emit a <think>
    # block, so the recorded trajectory matches how stage2.extract.project_steps
    # replays it (enable_thinking=False). vLLM reads chat_template_kwargs from
    # the request body; litellm forwards whatever is under extra_body.
    #
    # VERIFY LIVE ONCE before trusting a full run: the litellm<->vLLM extra_body
    # path has known quirks (BerriAI/litellm#4769). Send one completion through
    # this config and confirm the response carries no <think> block. If the
    # nesting is not honored, fall back to the Qwen `/no_think` soft-switch in
    # the system prompt, or a vLLM build with --default-chat-template-kwargs.
    extra_body:
      chat_template_kwargs:
        enable_thinking: false
